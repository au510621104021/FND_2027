# ============================================================================
# Multimodal Fake News Detection - Configuration
# ============================================================================

model:
  text_encoder:
    name: "bert-base-uncased"
    hidden_size: 768
    max_length: 256
    freeze_layers: 6          # Freeze first N layers of BERT

  image_encoder:
    name: "google/vit-base-patch16-224"
    hidden_size: 768
    image_size: 224
    freeze_layers: 8          # Freeze first N layers of ViT

  fusion:
    hidden_size: 512
    num_heads: 8
    num_cross_attn_layers: 2
    dropout: 0.1
    use_layer_norm: true

  classifier:
    hidden_sizes: [256, 128]
    dropout: 0.3
    num_classes: 2             # real vs fake

training:
  batch_size: 16
  num_epochs: 20
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  early_stopping_patience: 5
  scheduler: "cosine"          # cosine | linear | step
  fp16: true
  seed: 42
  val_split: 0.15
  test_split: 0.15

data:
  # Supported datasets: weibo, twitter_mediaeval, fakeddit, gossipcop, politifact, isot, generic
  dataset_name: "isot"
  data_dir: "./data/isot"
  num_workers: 4
  pin_memory: true
  augment_images: true
  image_augmentation:
    random_crop: true
    horizontal_flip: true
    color_jitter: true
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

evaluation:
  metrics: ["accuracy", "precision", "recall", "f1", "auc_roc"]
  average: "weighted"          # micro | macro | weighted
  save_confusion_matrix: true
  save_roc_curve: true

explainability:
  grad_cam:
    target_layer: "vit.encoder.layer.11"    # Last ViT encoder layer
    enabled: true
  text_attention:
    layer_index: -1            # Last attention layer
    head_aggregation: "mean"   # mean | max
    enabled: true
  save_dir: "./explanations"

inference:
  host: "0.0.0.0"
  port: 5000
  model_checkpoint: "./checkpoints/best_model.pt"
  confidence_threshold: 0.5
  max_batch_size: 32

logging:
  log_dir: "./logs"
  tensorboard: true
  log_every_n_steps: 50
  save_checkpoints: true
  checkpoint_dir: "./checkpoints"
