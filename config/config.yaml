# ==============================================================================
# Configuration for Multimodal Transformer Framework for Fake News Detection
# Conference-Level Experimental Setup
# ==============================================================================

data:
  augment_images: true
  data_dir: ./ISOT Fake News Dataset
  dataset_name: generic
  data_dirs:
  - ./ISOT Fake News Dataset
  - ./Fake News Dataset
  dataset_names:
  - generic
  - generic
  image_augmentation:
    color_jitter: true
    horizontal_flip: true
    normalize:
      mean:
        - 0.485
        - 0.456
        - 0.406
      std:
        - 0.229
        - 0.224
        - 0.225
    random_crop: true
  num_workers: 2
  pin_memory: true

evaluation:
  average: weighted
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - auc_roc
    - mcc
    - cohens_kappa
  save_confusion_matrix: true
  save_roc_curve: true
  # Statistical significance testing
  statistical_tests:
    enabled: true
    mcnemar: true
    bootstrap_ci: true
    bootstrap_n_iterations: 1000
    confidence_level: 0.95
    paired_t_test: true

# K-Fold Cross-Validation (conference standard)
cross_validation:
  enabled: true
  n_folds: 5
  stratified: true
  # Number of independent runs for mean ± std reporting
  n_runs: 3
  report_mean_std: true

explainability:
  grad_cam:
    enabled: true
    target_layer: vit.encoder.layer.11
  save_dir: ./explanations
  text_attention:
    enabled: true
    head_aggregation: mean
    layer_index: -1

inference:
  confidence_threshold: 0.5
  host: 0.0.0.0
  max_batch_size: 32
  model_checkpoint: ./combined_model_artifacts/checkpoints/best_model_combined.pt
  port: 5000

logging:
  checkpoint_dir: ./checkpoints
  log_dir: ./logs
  log_every_n_steps: 50
  save_checkpoints: true
  tensorboard: true

model:
  classifier:
    dropout: 0.3
    hidden_sizes:
      - 256
      - 128
    num_classes: 2
  fusion:
    dropout: 0.1
    hidden_size: 512
    num_cross_attn_layers: 2
    num_heads: 8
    use_layer_norm: true
  image_encoder:
    freeze_layers: 8
    hidden_size: 768
    image_size: 224
    name: google/vit-base-patch16-224
  text_encoder:
    freeze_layers: 6
    hidden_size: 768
    max_length: 256
    name: bert-base-uncased

training:
  batch_size: 8
  early_stopping_patience: 5
  fp16: true
  learning_rate: 2.0e-05
  max_grad_norm: 1.0
  num_epochs: 10
  scheduler: cosine
  seed: 42
  test_split: 0.15
  val_split: 0.15
  warmup_ratio: 0.1
  weight_decay: 0.01
  # Conference-level additions
  label_smoothing: 0.1
  focal_loss:
    enabled: false
    alpha: 0.25
    gamma: 2.0

# Publication-ready output settings
publication:
  latex_tables: true
  results_dir: ./results
  figures_dpi: 300
  figure_format: pdf
  font_family: serif
